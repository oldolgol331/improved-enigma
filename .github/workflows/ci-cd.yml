name: CI/CD Pipeline

# 이 워크플로우가 실행될 이벤트
on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches:
      - main
      - develop
    paths-ignore:
      - '**.md'
      - 'docs/**'

# 워크플로우 실행 시 concurrency 설정 (중복 실행 방지)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==================================================
  # Job 1: Lint & Type Check
  # ==================================================
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-learning-hub/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend-learning-hub
        run: npm ci

      - name: Run ESLint
        working-directory: ./frontend-learning-hub
        run: npm run lint

      - name: Run TypeScript check
        working-directory: ./frontend-learning-hub
        run: npx tsc --noEmit

  # ==================================================
  # Job 2: Test
  # ==================================================
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint-and-typecheck

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-learning-hub/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend-learning-hub
        run: npm ci

      - name: Run tests
        working-directory: ./frontend-learning-hub
        run: npm run test -- --run --coverage

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          files: ./frontend-learning-hub/coverage/coverage-final.json
          flags: frontend
          name: frontend-coverage
          fail_ci_if_error: false

  # ==================================================
  # Job 3: Build
  # ==================================================
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-learning-hub/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend-learning-hub
        run: npm ci

      - name: Build application
        working-directory: ./frontend-learning-hub
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: ./frontend-learning-hub/dist
          retention-days: 7

  # ==================================================
  # Job 4: Deploy to Vercel (Production)
  # ==================================================
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-learning-hub/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend-learning-hub
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment information
        working-directory: ./frontend-learning-hub
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project for Vercel
        working-directory: ./frontend-learning-hub
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        id: deploy
        working-directory: ./frontend-learning-hub
        run: |
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} > deployment-url.txt
          echo "url=$(cat deployment-url.txt)" >> $GITHUB_OUTPUT
